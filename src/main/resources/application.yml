server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/example_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.oa.system.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: oaSystemSecretKeyForJWTTokenGeneration2024VeryLongAndSecure
  expiration: 86400000

tencent:
  sms:
    secret-id: your-secret-id
    secret-key: your-secret-key
    app-id: your-app-id
    sign-name: 您的应用名称
    template-id: your-template-id

server:
  port: 8085

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
        username: nacos
        password: nOn2h1l8cHSG
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # system-service: 前端请求 /api/system/** → 转发为 /system/** 到 system-service
        - id: system-service
          uri: lb://system-service
          predicates:
            - Path=/api/system/**
          filters:
            - RewritePath=/api/system/(?<remaining>.*), /system/${remaining}

        # business-service: 前端请求 /api/business/** → 转发为 /business/** 到 business-service
        - id: business-service
          uri: lb://business-service
          predicates:
            - Path=/api/business/**
          filters:
            - StripPrefix=1

        # javachain-service: 前端请求 /api/javachain/** → 转发为 /api/** 到 javachain-service
        - id: javachain-service
          uri: lb://javachain
          predicates:
            - Path=/api/javachain/**
          filters:
            - RewritePath=/api/javachain/(?<remaining>.*), /api/${remaining}

jwt:
  secret: oa-system-jwt-secret-key-2024-for-secure-authentication-very-long-enough
  expiration: 86400000

# 可信服务配置（用于服务间调用）
gateway:
  trusted-services:
    python-service-key: python-service-secret-key-2024

# 日志配置
logging:
  level:
    com.oa.gateway: info
    org.springframework.cloud.gateway: info

server:
  port: 8085

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nOn2h1l8cHSG}
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: system-service
          uri: lb://system-service
          predicates:
            - Path=/api/system/**
          filters:
            - RewritePath=/api/system/(?<remaining>.*), /system/${remaining}

        - id: business-service
          uri: lb://business-service
          predicates:
            - Path=/api/business/**
          filters:
            - StripPrefix=1

        - id: javachain-service
          uri: lb://javachain
          predicates:
            - Path=/api/javachain/**
          filters:
            - RewritePath=/api/javachain/(?<remaining>.*), /api/${remaining}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms

jwt:
  secret: oa-system-jwt-secret-key-2024-for-secure-authentication-very-long-enough
  expiration: 864000000

gateway:
  sentinel:
    flow:
      business-service:
        count: 50
      javachain-session-history:
        count: 10
      interval-sec: 3
  ratelimit:
    per-user:
      count: 100
      window-seconds: 10
  trusted-services:
    python-service-key: python-service-secret-key-2024

logging:
  level:
    com.oa.gateway: info
    org.springframework.cloud.gateway: info
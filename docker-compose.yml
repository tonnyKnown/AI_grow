services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: oa-mysql
    environment:
      MYSQL_ROOT_PASSWORD: your_actual_password
      MYSQL_DATABASE: example_db
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./sql/xxl_job.sql:/docker-entrypoint-initdb.d/02-xxl-job.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pyour_actual_password"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: oa-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  nacos:
    image: ${NACOS_IMAGE:-nacos/nacos-server:v3.2.2}
    container_name: oa-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
      NACOS_AUTH_IDENTITY_KEY: "serverIdentity"
      NACOS_AUTH_IDENTITY_VALUE: "security"
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    ports:
      - "8080:8080"
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -X POST http://127.0.0.1:8848/nacos/v1/auth/users/login -H 'Content-Type: application/x-www-form-urlencoded' -d 'username=nacos&password=nOn2h1l8cHSG' | grep -q accessToken"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  xxl-job-admin:
    image: ${XXL_JOB_ADMIN_IMAGE:-xuxueli/xxl-job-admin:2.4.1}
    container_name: oa-xxl-job-admin
    environment:
      PARAMS: >-
        --spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        --spring.datasource.username=root
        --spring.datasource.password=your_actual_password
        --xxl.job.accessToken=
    ports:
      - "8088:8080"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  system-service:
    build:
      context: .
      dockerfile: docker/java17-runtime/Dockerfile
      args:
        BASE_IMAGE: ${JAVA17_IMAGE:-eclipse-temurin:17-jre}
        JAR_FILE: system-service/target/system-service-1.0.0.jar
    container_name: oa-system-service
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/example_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: your_actual_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: nOn2h1l8cHSG
      JAVA_TOOL_OPTIONS: -Xms128m -Xmx512m
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      nacos:
        condition: service_healthy
    restart: unless-stopped

  business-service:
    build:
      context: .
      dockerfile: docker/java17-runtime/Dockerfile
      args:
        BASE_IMAGE: ${JAVA17_IMAGE:-eclipse-temurin:17-jre}
        JAR_FILE: business-service/target/business-service-1.0.0.jar
    container_name: oa-business-service
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/example_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: your_actual_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: nOn2h1l8cHSG
      XXL_JOB_ADMIN_ADDRESSES: http://xxl-job-admin:8080/xxl-job-admin
      XXL_JOB_ACCESS_TOKEN: ""
      XXL_JOB_EXECUTOR_APP_NAME: business-service
      XXL_JOB_EXECUTOR_PORT: 9999
      XXL_JOB_EXECUTOR_LOG_PATH: /app/logs/xxl-job/jobhandler
      JAVA_TOOL_OPTIONS: -Xms128m -Xmx512m
    ports:
      - "8082:8082"
      - "9999:9999"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      nacos:
        condition: service_healthy
      xxl-job-admin:
        condition: service_started
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: docker/java17-runtime/Dockerfile
      args:
        BASE_IMAGE: ${JAVA17_IMAGE:-eclipse-temurin:17-jre}
        JAR_FILE: gateway/target/gateway-1.0.0.jar
    container_name: oa-gateway
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: nOn2h1l8cHSG
      JAVA_TOOL_OPTIONS: -Xms128m -Xmx384m
    ports:
      - "8085:8085"
    depends_on:
      nacos:
        condition: service_healthy
      system-service:
        condition: service_started
      business-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8085/api/system/users); [ \"$status\" = \"401\" ]"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./oa-frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: oa-frontend
    ports:
      - "5173:80"
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped

  mysql-plugin:
    build:
      context: D:/my_mcp/mysql-plugin
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${JAVA21_IMAGE:-eclipse-temurin:21-jre}
        JAR_FILE: target/mysql-plugin-1.0.0.jar
    container_name: oa-mysql-plugin
    environment:
      SERVER_PORT: 8083
      MYSQL_URL: jdbc:mysql://mysql:3306/example_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: your_actual_password
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_NAMESPACE: public
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: nOn2h1l8cHSG
      MCP_NACOS_REGISTER_ENABLED: "true"
      JAVA_TOOL_OPTIONS: -Xms128m -Xmx384m
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    restart: unless-stopped

  javachain:
    build:
      context: .
      dockerfile: docker/java21-runtime/Dockerfile
      args:
        BASE_IMAGE: ${JAVA21_IMAGE:-eclipse-temurin:21-jre}
        JAR_FILE: javachain/target/javachain-1.0.0.jar
    container_name: oa-javachain
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: example_db
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: your_actual_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: nOn2h1l8cHSG
      MCP_FALLBACK_BASE_URL: http://mysql-plugin:8083
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      JAVA_TOOL_OPTIONS: -Xms256m -Xmx768m
    ports:
      - "8087:8087"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      nacos:
        condition: service_healthy
      mysql-plugin:
        condition: service_started
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:

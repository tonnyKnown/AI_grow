server:
  port: 8087

spring:
  config:
    import:
      - optional:file:./.env[.properties]
      - optional:file:./javachain/.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:./application.yml
      - optional:file:./javachain/application.yml
      - optional:file:../application.yml
  application:
    name: javachain  # Agent 服务名称
  # Nacos 服务发现
  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nOn2h1l8cHSG}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nOn2h1l8cHSG}
  # MySQL 数据库配置 (用于 MCP 服务)
  datasource:
    mysql:
      host: ${MYSQL_HOST:localhost}
      port: ${MYSQL_PORT:3306}
      database: ${MYSQL_DATABASE:example_db}
      username: ${MYSQL_USERNAME:root}
      password: ${MYSQL_PASSWORD:}

  # Redis 配置 (用于 MCP 缓存)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# LLM 配置（统一配置，支持切换 Provider）
# 使用说明：
# 1. deepseek: 云端 DeepSeek API
# 2. ollama: 本地 Ollama 模型
javachain:
  llm:
    # 当前使用的 Provider：deepseek 或 ollama
    provider: ${JAVACHAIN_LLM_PROVIDER:deepseek}

    # DeepSeek 云端配置
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
#      chat-model: deepseek-chat
      chat-model:  deepseek-v4-flash

    # Ollama 本地配置
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:deepseek-r1:7b}
      temperature: 0.2
      timeout: 120s

# 阿里云 DashScope 配置（用于 Embeddings 向量化）
dashscope:
  api:
    key: ${DASHSCOPE_API_KEY:}
    embedding-model: text-embedding-v1

jwt:
  secret: ${JWT_SECRET:oa-system-jwt-secret-key-2024-for-secure-authentication-very-long-enough}


# 向量存储配置 - 使用内存向量库（无需外部数据库）
vector-store:
  type: memory

logging:
  level:
    com.example.javachain: DEBUG
    dev.langchain4j: INFO
    com.alibaba.nacos: DEBUG

# MCP 插件配置
mcp:
  target-service: ${MCP_TARGET_SERVICE:mysql-mcp-server}
  sse-endpoint: ${MCP_SSE_ENDPOINT:/mcp/sse}
  fallback-base-url: ${MCP_FALLBACK_BASE_URL:http://127.0.0.1:8083}
  plugin-dir: ./plugins
  auto-load: false

# Resilience4j 熔断配置
# 熔断器三态模型：Closed(关闭) -> Open(打开) -> HalfOpen(半开) -> Closed(关闭)
resilience4j:
  circuitbreaker:
    configs:
      default:
        # 失败率阈值（百分比）：当失败率超过此值时，熔断器从 Closed 转为 Open
        failure-rate-threshold: 50
        # 慢调用率阈值（百分比）：当慢调用率超过此值时，熔断器从 Closed 转为 Open
        slow-call-rate-threshold: 50
        # 慢调用判断阈值（毫秒）：超过此时间的调用视为慢调用
        slow-call-duration-threshold: 10000
        # 滑动窗口类型：COUNT_BASED(基于次数) 或 TIME_BASED(基于时间)
        sliding-window-type: COUNT_BASED
        # 滑动窗口大小：统计最近 N 次调用作为判断依据
        sliding-window-size: 10
        # 最小调用次数：熔断器开始计算失败率前，必须达到的最小调用次数
        minimum-number-of-calls: 5
        # 熔断器 Open 状态持续时间（毫秒）：打开后等待多久尝试恢复
        wait-duration-in-open-state: 30000
        # HalfOpen 状态允许的调用次数：半开状态下允许多少请求通过探测服务是否恢复
        permitted-number-of-calls-in-half-open-state: 3
        # 是否自动从 Open 转为 HalfOpen：到达 wait-duration 后自动进入半开状态
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      aiService:
        # 引用上面的 default 配置
        base-config: default

server:
  port: 8082

spring:
  application:
    name: business-service
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nOn2h1l8cHSG}
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/example_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:your_actual_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.oa.business.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 微信支付配置
wechat:
  pay:
    app-id: your_app_id
    mch-id: your_mch_id
    mch-key: your_mch_key
    cert-path: classpath:cert/apiclient_cert.p12
    notify-url: http://your-domain.com/api/pay/notify

# XXL-Job 分布式任务调度配置
xxl:
  job:
    admin:
      addresses: ${XXL_JOB_ADMIN_ADDRESSES:http://127.0.0.1:8088/xxl-job-admin}
    executor:
      app-name: ${XXL_JOB_EXECUTOR_APP_NAME:business-service}
      port: ${XXL_JOB_EXECUTOR_PORT:9999}
      log-path: ${XXL_JOB_EXECUTOR_LOG_PATH:./logs/xxl-job/jobhandler}
      log-retention-days: ${XXL_JOB_EXECUTOR_LOG_RETENTION_DAYS:30}
    access-token: ${XXL_JOB_ACCESS_TOKEN:}

# JWT配置
jwt:
  secret: oa-system-jwt-secret-key-2024-for-secure-authentication-very-long-enough
  expiration: 86400000
